name: Deploy Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install mkdocs-material
      - name: Restructure for MkDocs
        run: |
          mkdir -p docs_src/docs docs_src/meta
          cp README.md docs_src/docs/index.md
          cp docs/*.md docs_src/docs/
          cp meta/*.md docs_src/meta/
          cp mkdocs.yml docs_src/
      - run: cd docs_src && mkdocs gh-deploy --force
